version: '2.4'

x-service: &default-ms
  build:
    context: .
    dockerfile: ./docker_config/services/Dockerfile
  env_file: &db-environment
    - ./docker_config/postgres/environment.env
    - ./docker_config/redis/environment.env
    - ./docker_config/rabbitmq/environment.env
  depends_on:
    - initializer
  restart: on-failure
  expose:
    - 5000

x-celery-service: &default-celery-ms
  <<: *default-ms
  build:
    context: .
    dockerfile: ./docker_config/celery/Dockerfile
  volumes:
    - ./checkers/:/checkers/
  labels:
    traefik.enable: false

services:
  celery:
    <<: *default-celery-ms
    environment:
      - TEST
      - SERVICE=worker

  celerybeat:
    <<: *default-celery-ms
    environment:
      - TEST
      - SERVICE=beat

  flower:
    <<: *default-celery-ms
    environment:
      - TEST
      - SERVICE=flower
    env_file:
      - ./docker_config/celery/flower.env
      - ./docker_config/postgres/environment.env
      - ./docker_config/redis/environment.env
      - ./docker_config/rabbitmq/environment.env

  initializer:
    build:
      context: .
      dockerfile: ./docker_config/initializer/Dockerfile
    env_file: *db-environment
    environment:
      - TEST
    restart: on-failure
    depends_on:
      - postgres
      - redis
      - rabbitmq

  client:
    <<: *default-ms
    environment:
      - TEST
      - SERVICE=api

  admin:
    <<: *default-ms
    environment:
      - TEST
      - SERVICE=admin
    env_file:
      - ./docker_config/services/admin.env
      - ./docker_config/postgres/environment.env
      - ./docker_config/redis/environment.env
      - ./docker_config/rabbitmq/environment.env

  events:
    <<: *default-ms
    environment:
      - TEST
      - SERVICE=events

  monitoring:
    <<: *default-ms
    environment:
      - TEST
      - SERVICE=monitoring

  tcp_receiver:
    <<: *default-ms
    ports:
      - 31337:31337
    environment:
      - TEST
      - SERVICE=tcp_receiver

  nginx:
    image: nginx:1.17.9-alpine
    volumes:
      - ./docker_config/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./front/dist:/var/www/front:delegated
    restart: on-failure

  redis:
    image: redis:5.0.8-alpine
    command: [ "sh", "-c", "redis-server --requirepass $$REDIS_PASSWORD" ]
    restart: on-failure
    sysctls:
      net.core.somaxconn: 1024
    env_file:
      - ./docker_config/redis/environment.env
    ports:
      - "6379:6379"

  rabbitmq:
    hostname: rabbitmq
    image: rabbitmq:3.8.3-management-alpine
    restart: on-failure
    env_file:
      - ./docker_config/rabbitmq/environment.env
    ports:
      - "5672:5672"
      - "15672:15672"

  postgres:
    image: postgres:12.2
    volumes:
      - ./docker_volumes/postgres/data/:/var/lib/postgresql/data/
    env_file:
      - ./docker_config/postgres/environment.env
    restart: on-failure
    ports:
      - "5432:5432"
      - "6432:5432"

  traefik:
    image: traefik:2.3.2
    ports:
      - "8001:80"
    volumes:
      - ./docker_config/traefik/traefik.yml:/traefik.yml
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - monitoring
      - nginx
    sysctls:
      net.core.somaxconn: 1024
    labels:
      traefik.enable: true
      traefik.http.routers.api.entryPoints: http
      traefik.http.routers.api.rule: "PathPrefix(`/api`) || PathPrefix(`/dashboard`)"
      traefik.http.routers.api.service: "api@internal"
      traefik.http.routers.api.middlewares: "auth"
      traefik.http.routers.dashboard.middlewares: "auth"
      traefik.http.middlewares.auth.forwardAuth.address: "http://admin:5000/api/admin/status/"
